<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Chá Revelação - Raspadinha</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #fffaf0;
      }

      h1 {
        margin-top: 20px;
        color: #b8962e;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 10px;
        max-width: 600px;
        margin: 20px auto;
      }

      .card {
        background: #d4af37;
        border-radius: 50%;
        padding: 15px;
        cursor: pointer;
        font-weight: bold;
        color: white;
      }

      .card:hover {
        background: #c9a227;
      }

      .revealed {
        background: #fff;
        color: #b8962e;
        border: 2px solid #d4af37;
        cursor: default;
      }
    </style>
  </head>

  <body>
    <h1>Escolha um número 💛</h1>

    <input
      type="text"
      id="nome"
      placeholder="Digite seu nome"
      style="padding: 10px; margin: 10px"
    />

    <div class="grid" id="grid"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAQMMw7aYlUkxVOvj9vcXiTN_vuxeYNUpo",
        authDomain: "raspadinha-cha.firebaseapp.com",
        projectId: "raspadinha-cha",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const grid = document.getElementById("grid");

      async function carregar() {
        const snapshot = await db.collection("raspadinha").get();

        let lista = [];

        snapshot.forEach((doc) => {
          lista.push({
            id: doc.id,
            ...doc.data(),
          });
        });

        // 🔥 ordenar certinho 1 → 60
        lista.sort((a, b) => Number(a.id) - Number(b.id));

        lista.forEach((item) => {
          const div = document.createElement("div");
          div.className = "card";

          if (!item.disponivel) {
            div.classList.add("revealed");
            div.innerText = item.presente + "\n(" + item.nome + ")";
          } else {
            div.innerText = item.id;
          }

          div.onclick = async function () {
            if (!item.disponivel) return;

            let nome = document.getElementById("nome").value.trim();

            if (!nome) {
              alert("Digite seu nome!");
              return;
            }

            await db.collection("raspadinha").doc(item.id).update({
              disponivel: false,
              nome: nome,
            });

            div.classList.add("revealed");
            div.innerText = item.presente + "\n(" + nome + ")";
          };

          grid.appendChild(div);
        });
      }

      carregar();
    </script>
  </body>
</html>
