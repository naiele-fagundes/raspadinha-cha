<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Chá Revelação - Raspadinha</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #fffaf0;
      }

      h1 {
        margin-top: 20px;
        color: #b8962e;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 10px;
        max-width: 600px;
        margin: 20px auto;
      }

      .card {
        background: #d4af37;
        border-radius: 50%;
        padding: 15px;
        cursor: pointer;
        font-weight: bold;
        color: white;
      }

      .card:hover {
        background: #c9a227;
      }

      .revealed {
        background: #fff;
        color: #d4af37;
        border: 2px solid #d4af37;
      }
    </style>
  </head>

  <body>
    <h1>Escolha um número 💛</h1>

    <input
      type="text"
      id="nome"
      placeholder="Digite seu nome"
      style="padding: 10px; margin: 10px"
    />
    <div style="margin: 15px">
      <label><b>Qual o seu palpite?</b></label
      ><br /><br />

      <label style="margin-right: 15px">
        <input type="radio" name="palpite" value="Meninos" /> Meninos
      </label>

      <label style="margin-right: 15px">
        <input type="radio" name="palpite" value="Meninas" /> Meninas
      </label>

      <label>
        <input type="radio" name="palpite" value="Casal" /> Um casal
      </label>
    </div>

    <div class="grid" id="grid"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAQMMw7aYlUkxVOvj9vcXiTN_vuxeYNUpo",
        authDomain: "raspadinha-cha.firebaseapp.com",
        projectId: "raspadinha-cha",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const grid = document.getElementById("grid");

      async function carregar() {
        const snapshot = await db.collection("raspadinha").get();

        let lista = [];

        snapshot.forEach((doc) => {
          lista.push({
            id: doc.id,
            ...doc.data(),
          });
        });

        // 🔥 ordenar certinho 1 → 60
        lista.sort((a, b) => Number(a.id) - Number(b.id));

        lista.forEach((item) => {
          const div = document.createElement("div");
          div.className = "card";

          if (!item.disponivel) {
            div.classList.add("revealed");
            div.innerText = item.presente + "\n(" + item.nome + ")";
          } else {
            div.innerText = item.id;
          }

          div.onclick = async function () {
            if (!item.disponivel) return;
            let nome = document.getElementById("nome").value.trim();

            if (!nome) {
              alert("Digite seu nome primeiro!");
              return;
            }

            // pegar palpite
            let palpiteSelecionado = document.querySelector(
              'input[name="palpite"]:checked',
            );

            if (!palpiteSelecionado) {
              alert("Escolha seu palpite!");
              return;
            }

            let palpite = palpiteSelecionado.value;
            // 🔒 Verificar no Firebase se já escolheu
            const query = await db
              .collection("raspadinha")
              .where("nome", "==", nome)
              .get();

            if (!query.empty) {
              alert("Você já escolheu um número!");
              return;
            }

            // 🔒 Atualizar no Firebase
            await db.collection("raspadinha").doc(item.id).update({
              disponivel: false,
              nome: nome,
              palpite: palpite,
            });

            div.classList.add("revealed");
            div.innerText =
              item.presente + "\n(" + nome + " - " + palpite + ")";
            item.disponivel = false;
          };
          grid.appendChild(div);
        });
      }

      carregar();
    </script>
  </body>
</html>
